<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip 7</title>
<link rel="stylesheet" href="flip7styles.css">
<style>
  * {
    box-sizing: border-box;
  }
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: light-dark(#f4f4f4, #333);
  }

  h1 {
    font-size: 24px;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 18px;
    margin: 10px 0;
  }
  input{
    display: block;
    margin: 5px auto;
    padding: 8px;
    width: min(100%, 200px);
    border-radius: 10px;
    border: 1px solid light-dark(#44444444, #ddd);
  }

  /* 📱 Spieler Layout */
  #players {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .player {
    padding: 10px;
    border-radius: 12px;
    background: light-dark(white, #555);
  }

  .active {
    outline: 3px solid #4caf50;
  }

  /* 🃏 Karten */
  .cards {
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 10px;
  }

  .card {
    display: inline-flex;
    justify-content: center;
    align-items: center;

    width: 50px;
    height: 70px;

    border-radius: 10px;
    border: 2px solid light-dark(#333, #ccc);

    font-size: 22px;
    font-weight: bold;
    color: white;

    box-shadow: 1px 2px 5px  light-dark(rgba(0,0,0,0.2), rgba(255,255,255,0.2));

    /* 🔥 DAS IST DER TRICK */
    margin-left: -20px;
  }

  .card:first-child {
    margin-left: 0;
  }

  /* 📱 Buttons */
  .controls {
    position: sticky;
    bottom: 0;
    background: light-dark(#f4f4f4, #333);
    padding: 10px 0;
    margin-top: 10px;
    display: flex;
  }

  button {
    width: 100%;
    padding: 14px;
    margin: 5px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: light-dark(#333, #ccc);
    color: light-dark(white, #333);
  }

  button:active {
    transform: scale(0.97);
  }

  /* 📱 Tablet */
  @media (min-width: 600px) {
    .card {
      width: 60px;
      height: 85px;
      font-size: 26px;
    }

    #players {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
    }

    .player {
      width: 45%;
    }
  }

  /* 💻 Desktop */
  @media (min-width: 900px) {
    .card {
      width: 70px;
      height: 100px;
      font-size: 32px;
    }

    .player {
      width: 22%;
    }
  }

  dialog {
    border: none;
    border-radius: 12px;
    padding: 20px;
    width: 90%;
    max-width: 400px;
  }
  dialog::backdrop {
      background-color: rgba(0, 0, 0, 0.3);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
  }

  th, td {
    padding: 8px;
    border-bottom: 1px solid light-dark(#ddd, #555);
    text-align: center;
  }

  th {
    background: light-dark(#f0f0f0, #555);
  }

  tr:first-child {
    font-weight: bold;
    background: light-dark(#fff3cd, #555);
  }
</style>
</head>
<body>
<div id="setup" style="display: flex; flex-direction: column; justify-content: center; align-content: center; align-items: center;">
  <div style="text-align: center; width: min(100%, 200px);">
    <h1>Flip 7</h1>
    <p>Spieleranzahl (2–16):</p>
    <input type="range" style="width: 100%;" id="playerCount" min="2" max="16" step="1" value="2" onchange="renderNameInputs()">
  </div>
  <div id="nameInputs" style="width: min(100%, 200px);"></div>

  <button onclick="startGame()" style="width: min(80%, 200px)">Spiel starten</button>
</div>

<div id="game" style="display:none;">
  <h2 id="status" style="text-align: center;"></h2>
  <div id="players"></div>
<div class="controls">
  <button onclick="drawCard()">Karte ziehen</button>
  <button onclick="stopTurn()">Stopp</button>
</div>
</div>
<dialog id="scoreDialog">
  <h2>🏆 Spiel beendet</h2>
  <table id="scoreTable">
    <thead>
      <tr>
        <th>Platz</th>
        <th>Name</th>
        <th>Punkte</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="location.reload()">Neues Spiel</button>
</dialog>
</body>
</html>
