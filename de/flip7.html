<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Flip 7</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
  }

  .card {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 70px;
    height: 100px;
    margin: 6px;
    border-radius: 12px;
    border: 3px solid #333;
    font-size: 32px;
    font-weight: bold;
    color: white;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
  }

  .player {
    margin: 15px;
    padding: 10px;
    border-radius: 10px;
    background: white;
  }

  .active {
    outline: 4px solid #4caf50;
  }

  button {
    padding: 12px 24px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #555;
  }
</style>
</head>
<body>

<h1>Flip 7</h1>

<div id="setup">
  <label>Spieleranzahl (2–4): </label>
  <input type="number" id="playerCount" min="2" max="4" value="2">
  <button onclick="startGame()">Spiel starten</button>
</div>

<div id="game" style="display:none;">
  <h2 id="status"></h2>
  <div id="players"></div>
  <button onclick="drawCard()">Karte ziehen</button>
  <button onclick="stopTurn()">Stopp</button>
</div>

<script>
let players = [];
let currentPlayer = 0;
let deck = [];
let gameOver = false;

function getCardColor(value) {
  const colors = [
    "#6c757d", // 0
    "#007bff",
    "#28a745",
    "#ffc107",
    "#dc3545",
    "#17a2b8",
    "#6610f2",
    "#fd7e14",
    "#20c997",
    "#e83e8c",
    "#343a40",
    "#ff5733",
    "#6f42c1"
  ];
  return colors[value] || "#999";
}

function createDeck() {
  deck = [];

  for (let i = 0; i <= 12; i++) {
    let count = i === 0 ? 1 : i; // 0 nur einmal, sonst = Zahlenwert

    for (let j = 0; j < count; j++) {
      deck.push(i);
    }
  }

  deck.sort(() => Math.random() - 0.5);
}

function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  players = [];
  for (let i = 0; i < count; i++) {
    players.push({
      score: 0,
      roundCards: [],
      status: "active" // active | stopped | bust
    });
  }

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  startRound();
}

function startRound() {
  createDeck();
  players.forEach(p => {
    p.roundCards = [];
    p.status = "active";
  });
  currentPlayer = 0;
  gameOver = false;
  updateUI();
}

function drawCard() {
  if (gameOver) return;

  const player = players[currentPlayer];
  if (player.status !== "active") return;

  const card = deck.pop();
  
  if (player.roundCards.includes(card)) {
  player.roundCards.push(card); // Karte trotzdem anzeigen
  alert(`Spieler ${currentPlayer + 1} bust!`);
  player.status = "bust";
  nextPlayer();
  return;
  }

  player.roundCards.push(card);

  if (player.roundCards.length === 7) {
    alert(`Spieler ${currentPlayer + 1} hat Flip 7!`);
    endRound(currentPlayer);
    return;
  }

  nextPlayer();
}

function stopTurn() {
  if (gameOver) return;

  const player = players[currentPlayer];
  player.status = "stopped";
  nextPlayer();
}

function nextPlayer() {
  // Prüfe ob Runde vorbei ist
  const activePlayers = players.filter(p => p.status === "active");

  if (activePlayers.length <= 1) {
    endRound();
    return;
  }

  // nächsten aktiven Spieler finden
  do {
    currentPlayer = (currentPlayer + 1) % players.length;
  } while (players[currentPlayer].status !== "active");

  updateUI();
}

function endRound(winner = null) {
  gameOver = true;

  players.forEach((p, i) => {
    if (p.status !== "bust") {
      let points = p.roundCards.reduce((a, b) => a + b, 0);

      if (winner === i) {
        points += 15;
      }

      p.score += points;
    }
  });

  if (players.some(p => p.score >= 200)) {
    const winnerIndex = players.findIndex(p => p.score >= 200);
    alert("Spieler " + (winnerIndex + 1) + " gewinnt das Spiel!");
    location.reload();
    return;
  }

  setTimeout(startRound, 2000);
}

function updateUI() {
  document.getElementById("status").innerText =
    "Spieler " + (currentPlayer + 1) + " ist am Zug";

  const container = document.getElementById("players");
  container.innerHTML = "";

  players.forEach((p, i) => {
    const div = document.createElement("div");
div.classList.add("player");

    if (i === currentPlayer) div.classList.add("active");

    let statusText = "";
    if (p.status === "bust") statusText = "💥 Bust";
    if (p.status === "stopped") statusText = "🛑 Gestoppt";

    div.innerHTML = `
      <h3>Spieler ${i + 1} (Punkte: ${p.score}) ${statusText}</h3>
      ${p.roundCards.map(c => `
  <span class="card" style="background:${getCardColor(c)}">
    ${c}
  </span>
`).join("")}
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
