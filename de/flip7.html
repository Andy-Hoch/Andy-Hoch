<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip 7</title>
<link rel="stylesheet" href="flip7styles.css">
</head>
<body>
<div id="setup" style="display: flex; flex-direction: column; justify-content: center; align-content: center; align-items: center;">
  <div style="text-align: center; width: min(100%, 200px);">
    <h1>Flip 7</h1>
    <p>Spieleranzahl (2–16):</p>
    <input type="range" style="width: 100%;" id="playerCount" min="2" max="16" step="1" value="2" onchange="renderNameInputs()">
  </div>
  <div id="nameInputs" style="width: min(100%, 200px);"></div>

  <button onclick="startGame()" style="width: min(80%, 200px)">Spiel starten</button>
</div>

<div id="game" style="display:none;">
  <h2 id="status" style="text-align: center;"></h2>
  <div id="players"></div>
<div class="controls">
  <button onclick="drawCard()">Karte ziehen</button>
  <button onclick="stopTurn()">Stopp</button>
</div>
</div>
<dialog id="scoreDialog">
  <h2>🏆 Spiel beendet</h2>
  <table id="scoreTable">
    <thead>
      <tr>
        <th>Platz</th>
        <th>Name</th>
        <th>Punkte</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="location.reload()">Neues Spiel</button>
</dialog>
</body>
</html>
